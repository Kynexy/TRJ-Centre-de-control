<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurel - Kynexy</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="aurel-system.css">
</head>
<body>
<div class="home-app">
<header class="top"><h1>Aurel</h1><p>Vue terrain claire : caméra, radar, conditions et demain.</p><div class="status"><span id="heure">Initialisation</span><span id="date">Initialisation</span></div></header>
<section class="panel webcam"><h2>Caméras de Tahiti</h2><video id="faaaCam" autoplay muted playsinline controls></video><div id="webcamSelector"></div><div id="webcamStatus">Vérification du flux...</div></section>
<section class="panel weather"><h2>Conditions chantier</h2><div id="weather">Chargement météo...</div></section>
<section class="panel"><h2>Radar</h2><div id="radar">Radar Tahiti</div></section>
<section class="panel forecast"><h2>Prévisions de demain</h2><div id="tomorrowForecast">Chargement des prévisions...</div></section>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.7/dist/hls.min.js"></script>
<script src="config.js"></script>
<script src="modules/webcam.js"></script>
<script src="modules/clock.js"></script>
<script src="modules/radar.js"></script>
<script src="script.js"></script>
<script src="aurel-system.js"></script>
</body>
</html>
