<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07182d">

<title>Kynexy CRM TRJ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

:root{
--bg:#07182d;
--card:#123d74;
--card-2:#0f2f58;
--blue:#2ca9ff;
--blue-soft:#9fd4ff;
--green:#5ee37d;
--orange:#ffd166;
--red:#ff6b6b;
--text:#ffffff;
--muted:rgba(255,255,255,.72);
--line:rgba(255,255,255,.12);
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
padding:16px;
}

button,
input,
select,
textarea{
font:inherit;
}

button{
cursor:pointer;
}

a{
color:inherit;
text-decoration:none;
}

.crm-shell{
max-width:1480px;
margin:0 auto;
padding-bottom:94px;
}

.topbar{
background:linear-gradient(135deg,#123d74,#1c5fb6);
padding:22px;
border-radius:22px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:18px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.title h1{
font-size:2rem;
margin-bottom:4px;
}

.title p{
opacity:.8;
}

.status{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.pill{
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.12);
border-radius:999px;
padding:9px 13px;
font-size:14px;
color:var(--text);
}

.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:22px;
align-items:start;
}

.sidebar,
.card{
background:var(--card);
border-radius:22px;
padding:22px;
box-shadow:0 8px 25px rgba(0,0,0,.30);
}

.sidebar{
position:sticky;
top:16px;
}

.brand-mark{
width:58px;
height:58px;
border-radius:50%;
background:var(--blue);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
box-shadow:0 0 28px rgba(44,169,255,.65);
margin-bottom:18px;
}

.nav{
display:flex;
flex-direction:column;
gap:9px;
}

.nav button{
width:100%;
border:0;
border-radius:13px;
padding:12px 13px;
text-align:left;
background:rgba(255,255,255,.08);
color:white;
transition:.2s;
}

.nav button:hover,
.nav button.active{
background:var(--blue);
}

.sidebar-note{
margin-top:20px;
padding-top:18px;
border-top:1px solid var(--line);
font-size:13px;
line-height:1.5;
color:var(--muted);
}

.main{
display:flex;
flex-direction:column;
gap:22px;
}

.hero{
background:linear-gradient(135deg,#0b2b4e,#164b82);
border-radius:22px;
padding:22px;
display:grid;
grid-template-columns:1.4fr .8fr;
gap:18px;
box-shadow:0 8px 25px rgba(0,0,0,.30);
}

.hero h2,
.card h2{
color:var(--blue-soft);
margin-bottom:14px;
}

.hero p,
.card-copy{
color:var(--muted);
line-height:1.5;
}

.quick-actions{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px;
}

.primary-btn,
.ghost-btn,
.icon-btn{
border:0;
border-radius:13px;
padding:13px;
color:white;
min-height:44px;
}

.primary-btn{
background:var(--blue);
}

.ghost-btn,
.icon-btn{
background:rgba(255,255,255,.12);
}

.icon-btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
min-width:46px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:16px;
}

.metric{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
min-height:122px;
}

.metric span{
display:block;
color:var(--muted);
font-size:14px;
margin-bottom:12px;
}

.metric strong{
font-size:34px;
line-height:1;
}

.metric small{
display:block;
margin-top:8px;
color:var(--muted);
line-height:1.4;
}

.module-grid{
display:grid;
grid-template-columns:1.15fr .85fr;
gap:22px;
}

.tri-grid{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:16px;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:16px;
}

.toolbar input,
.toolbar select{
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.14);
border-radius:12px;
padding:12px 13px;
color:white;
min-width:170px;
}

.toolbar input::placeholder{
color:rgba(255,255,255,.55);
}

.toolbar select option{
color:#0f2f58;
}

.list{
display:flex;
flex-direction:column;
gap:11px;
}

.row{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:15px;
display:grid;
grid-template-columns:1fr auto;
gap:14px;
align-items:center;
}

.row h3{
font-size:17px;
margin-bottom:5px;
}

.row p{
font-size:14px;
line-height:1.5;
color:var(--muted);
}

.row-actions{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.tag{
display:inline-flex;
align-items:center;
gap:6px;
border-radius:999px;
padding:7px 10px;
background:rgba(255,255,255,.12);
font-size:13px;
white-space:nowrap;
}

.tag.ready,
.state-ready{
color:var(--green);
}

.tag.warn,
.state-warn{
color:var(--orange);
}

.tag.blocked,
.state-blocked{
color:var(--red);
}

.tag.info{
color:var(--blue-soft);
}

.job-card,
.message-card,
.quote-card,
.team-card,
.stat-card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.09);
border-radius:18px;
padding:16px;
}

.job-card{
display:grid;
grid-template-columns:1fr auto;
gap:14px;
align-items:start;
}

.job-card h3,
.quote-card h3,
.team-card h3{
font-size:18px;
margin-bottom:7px;
}

.job-meta,
.message-card p,
.quote-card p,
.team-card p,
.stat-card p{
color:var(--muted);
font-size:14px;
line-height:1.45;
}

.job-signals{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.client-profile{
display:grid;
grid-template-columns:.85fr 1.15fr;
gap:16px;
}

.profile-panel{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
}

.profile-panel strong{
display:block;
font-size:24px;
margin-bottom:8px;
}

.profile-line{
display:flex;
justify-content:space-between;
gap:12px;
padding:10px 0;
border-bottom:1px solid var(--line);
color:var(--muted);
font-size:14px;
}

.profile-line:last-child{
border-bottom:0;
}

.photo-strip{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:12px;
}

.photo-tile{
aspect-ratio:1.2;
border-radius:14px;
background:linear-gradient(135deg,rgba(44,169,255,.36),rgba(255,255,255,.1));
border:1px solid rgba(255,255,255,.12);
display:flex;
align-items:end;
padding:10px;
font-size:12px;
color:var(--blue-soft);
}

.quote-board{
display:grid;
grid-template-columns:repeat(3,minmax(190px,1fr));
gap:14px;
overflow:auto;
padding-bottom:2px;
}

.lane{
background:rgba(0,0,0,.13);
border:1px solid var(--line);
border-radius:18px;
padding:14px;
min-height:260px;
}

.lane h3{
font-size:15px;
color:var(--blue-soft);
margin-bottom:12px;
}

.message-card{
display:grid;
grid-template-columns:auto 1fr auto;
gap:12px;
align-items:center;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:var(--blue);
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
box-shadow:0 0 18px rgba(44,169,255,.45);
}

.stat-card strong{
display:block;
font-size:34px;
line-height:1;
margin-bottom:10px;
}

.progress{
height:9px;
border-radius:999px;
background:rgba(255,255,255,.12);
overflow:hidden;
margin-top:14px;
}

.progress span{
display:block;
height:100%;
background:var(--blue);
border-radius:inherit;
}

.empty{
background:rgba(255,255,255,.07);
border:1px dashed rgba(255,255,255,.22);
border-radius:16px;
padding:18px;
color:var(--muted);
line-height:1.5;
}

.drawer{
display:none;
position:fixed;
right:16px;
top:16px;
bottom:16px;
width:min(460px,calc(100vw - 32px));
background:#0f2f58;
border:1px solid rgba(255,255,255,.12);
border-radius:22px;
box-shadow:0 18px 50px rgba(0,0,0,.45);
z-index:20;
padding:22px;
overflow:auto;
}

.drawer.open{
display:block;
}

.drawer-header{
display:flex;
justify-content:space-between;
gap:12px;
align-items:center;
margin-bottom:18px;
}

.form{
display:flex;
flex-direction:column;
gap:12px;
}

.form label{
font-size:13px;
color:var(--muted);
}

.form input,
.form select,
.form textarea{
width:100%;
margin-top:6px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.15);
border-radius:13px;
padding:12px;
color:white;
}

.form select option{
color:#0f2f58;
}

.form textarea{
min-height:92px;
resize:vertical;
}

.aurel-cloud{
position:fixed;
right:18px;
bottom:18px;
z-index:15;
width:min(335px,calc(100vw - 36px));
background:linear-gradient(135deg,rgba(44,169,255,.96),rgba(22,75,130,.96));
border:1px solid rgba(255,255,255,.24);
border-radius:24px;
box-shadow:0 18px 45px rgba(0,0,0,.38),0 0 34px rgba(44,169,255,.35);
padding:15px;
display:grid;
grid-template-columns:auto 1fr;
gap:12px;
align-items:center;
}

.aurel-orb{
width:54px;
height:54px;
border-radius:50%;
background:#9fd4ff;
color:#07182d;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:24px;
box-shadow:0 0 24px rgba(255,255,255,.55);
}

.aurel-cloud strong{
display:block;
margin-bottom:5px;
}

.aurel-cloud p{
font-size:13px;
line-height:1.4;
color:rgba(255,255,255,.82);
}

.footer-note{
color:var(--muted);
font-size:13px;
line-height:1.5;
}

@media(max-width:1050px){
.layout,
.hero,
.module-grid,
.client-profile{
grid-template-columns:1fr;
}

.sidebar{
position:static;
}

.nav{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
}

.grid,
.tri-grid{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(max-width:720px){
body{
padding:10px;
}

.topbar,
.sidebar,
.card,
.hero{
border-radius:20px;
padding:18px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.status,
.quick-actions,
.grid,
.tri-grid,
.nav,
.quote-board{
grid-template-columns:1fr;
}

.status,
.toolbar{
flex-direction:column;
align-items:stretch;
width:100%;
}

.pill{
max-width:100%;
overflow-wrap:anywhere;
}

.toolbar input,
.toolbar select,
.toolbar button{
width:100%;
}

.row,
.job-card,
.message-card{
grid-template-columns:1fr;
}

.row-actions{
justify-content:flex-start;
}

.aurel-cloud{
left:10px;
right:10px;
bottom:10px;
width:auto;
}
}

</style>
<link rel="stylesheet" href="aurel-system.css">

</head>

<body>

<div class="crm-shell">

<header class="topbar">
<div class="title">
<h1>CRM</h1>
<p>Clients, devis et factures</p>
</div>
<div class="status">
<div class="pill" id="crmSourceStatus">Clients a jour</div>
<div class="pill" id="crmClock">Initialisation</div>
</div>
</header>

<div class="layout">

<aside class="sidebar">
<nav class="nav" id="crmNav">
<button class="active" data-view="clients">Clients</button>
<button data-view="quotes">Devis</button>
<button data-view="invoices">Factures</button>
</nav>
<div class="sidebar-note">
Un CRM volontairement simple : fiches clients, répertoire, devis et factures.
</div>
</aside>

<main class="main">

<section class="hero">
<div>
<h2 id="viewTitle">Clients</h2>
<p id="viewSubtitle">Répertoire client, devis et factures au même endroit.</p>
</div>
<div class="quick-actions">
<button class="primary-btn" data-action="open-drawer" data-kind="client">Nouveau client</button>
<button class="ghost-btn" data-action="open-drawer" data-kind="quote">Créer un devis</button>
<button class="ghost-btn" data-action="open-drawer" data-kind="invoice">Créer une facture</button>
</div>
</section>

<section class="grid" id="crmMetrics"></section>

<section id="crmView"></section>

</main>

</div>

</div>

<aside class="drawer" id="crmDrawer" aria-hidden="true">
<div class="drawer-header">
<h2 id="drawerTitle">Nouvelle action</h2>
<button class="ghost-btn" id="closeDrawer" type="button">Fermer</button>
</div>
<form class="form" id="crmForm">
<label>
Type
<select id="formType">
<option value="client">Client</option>
<option value="quote">Devis</option>
<option value="invoice">Facture</option>
</select>
</label>
<label>
Nom
<input id="formName" type="text" placeholder="Nom client ou chantier">
</label>
<label>
Telephone
<input id="formPhone" type="tel" placeholder="+689 ...">
</label>
<label>
Adresse
<input id="formAddress" type="text" placeholder="Commune, quartier, repere">
</label>
<label>
TVA
<select id="formTaxRate">
<option value="0">0%</option>
<option value="5">5%</option>
<option value="13">13%</option>
<option value="16">16%</option>
<option value="20">20%</option>
</select>
</label>
<label>
Notes
<textarea id="formNotes" placeholder="Besoin, montant, prochaine action"></textarea>
</label>
<button class="primary-btn" type="submit">Enregistrer l'action</button>
<p class="footer-note" id="formFeedback">Action preparee localement.</p>
</form>
</aside>

<script>

const CRM_TABLES = [
    "summary",
    "today",
    "jobs",
    "clients",
    "quotes",
    "stats",
    "invoices",
];

const CRM_OBJECT_TABLES = ["summary", "stats"];

const CRM_STATE = {
    view: "clients",
    data: getInitialData(),
    draftQueue: []
};

const CRM_VIEWS = {
clients: {
        title: "Clients",
        subtitle: "Coordonnees, historique, notes, photos et devis associes.",
        render: renderClients
    },
    quotes: {
        title: "Devis",
        subtitle: "Créer et suivre les devis avec le taux de TVA choisi.",
        render: renderQuotes
    },
    invoices: {
        title: "Factures",
        subtitle: "Créer et suivre les factures client avec TVA.",
        render: renderInvoices
    }
};

document.addEventListener("DOMContentLoaded", initCrm);

function initCrm() {

    updateClock();
    window.setInterval(updateClock, 30000);

    initNavigation();
    initDrawer();
    renderCrm();

}

function getInitialData() {

    const source = window.KYNEX_CRM_DATA || {};
    const fallback = getDemoData();
    const data = {};

    CRM_TABLES.forEach((table) => {
        const expectsObject = CRM_OBJECT_TABLES.includes(table);

        if (!expectsObject && Array.isArray(source[table])) {
            data[table] = source[table];
            return;
        }

        if (expectsObject && source[table] && typeof source[table] === "object" && !Array.isArray(source[table])) {
            data[table] = source[table];
            return;
        }

        data[table] = fallback[table];
    });

    return data;

}

function getDemoData() {

    return {
        summary: {
            patronName: "Patron",
            dayResume: "Clients, devis et factures a traiter."
        },
        today: [],
        jobs: [],
        clients: [
            {
                name: "Famille M.",
                phone: "+689 87 00 00 01",
                email: "client@example.com",
                address: "Paea - PK 21",
                status: "Actif",
                history: ["Appel recu", "Visite technique", "Devis accepte"],
                notes: "Client prioritaire. Acces par portail cote mer.",
                photos: ["Avant", "Pendant", "Apres"],
                quotes: ["DEV-1042", "DEV-1048"]
            },
            {
                name: "SCI Vai",
                phone: "+689 87 00 00 02",
                email: "contact@example.com",
                address: "Punaauia",
                status: "En cours",
                history: ["Demande client", "Diagnostic planifie"],
                notes: "Verifier infiltration apres pluie.",
                photos: ["Fuite", "Plafond", "Acces"],
                quotes: ["DEV-1051"]
            }
        ],
        quotes: [
            { number: "DEV-1042", client: "Famille M.", amount: "485 000 F", taxRate: "13%", status: "accepted", label: "Accepte" },
            { number: "DEV-1051", client: "SCI Vai", amount: "96 000 F", taxRate: "13%", status: "pending", label: "En attente" },
            { number: "DEV-1053", client: "Particulier Mahina", amount: "158 000 F", taxRate: "13%", status: "pending", label: "En attente" }
        ],
        invoices: [
            { number: "FAC-2084", client: "Famille M.", amount: "485 000 F", taxRate: "13%", status: "paid", label: "Payee" },
            { number: "FAC-2085", client: "SCI Vai", amount: "96 000 F", taxRate: "13%", status: "pending", label: "A regler" }
        ],
        stats: {
            revenue: "0 F",
            quotesSent: 3,
            acceptanceRate: 0,
            jobsDone: 0
        }
    };

}

function initNavigation() {

    document.querySelectorAll("#crmNav button").forEach((button) => {
        button.addEventListener("click", () => {
            CRM_STATE.view = button.dataset.view;
            renderCrm();
        });
    });

    document.querySelectorAll("[data-view-shortcut]").forEach((button) => {
        button.addEventListener("click", () => {
            CRM_STATE.view = button.dataset.viewShortcut;
            renderCrm();
        });
    });

}

function initDrawer() {

    document.querySelectorAll("[data-action='open-drawer']").forEach((button) => {
        button.addEventListener("click", () => openDrawer(button.dataset.kind));
    });

    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);

    document.getElementById("crmForm").addEventListener("submit", (event) => {
        event.preventDefault();
        saveDraft();
    });

}

function renderCrm() {

    renderNav();
    renderHeader();
    renderMetrics();
    const view = CRM_VIEWS[CRM_STATE.view] || CRM_VIEWS.clients;
    view.render(document.getElementById("crmView"));

}

function renderNav() {

    document.querySelectorAll("#crmNav button").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === CRM_STATE.view);
    });

}

function renderHeader() {

    const view = CRM_VIEWS[CRM_STATE.view] || CRM_VIEWS.clients;
    document.getElementById("viewTitle").textContent = view.title;
    document.getElementById("viewSubtitle").textContent = view.subtitle;

    const hasExternalData = Boolean(window.KYNEX_CRM_DATA);
    document.getElementById("crmSourceStatus").textContent = hasExternalData ? "Clients synchronises" : "Clients a jour";

}

function renderMetrics() {

    const metrics = [
        { label: "Clients", value: CRM_STATE.data.clients.length, detail: "Fiches actives" },
        { label: "Devis", value: CRM_STATE.data.quotes.length, detail: "Avec TVA" },
        { label: "Factures", value: CRM_STATE.data.invoices.length, detail: "Suivi client" },
        { label: "Brouillons", value: CRM_STATE.draftQueue.length, detail: "A enregistrer" }
    ];

    document.getElementById("crmMetrics").innerHTML = metrics.map((metric) => `
        <article class="metric">
            <span>${escapeHtml(metric.label)}</span>
            <strong>${escapeHtml(metric.value)}</strong>
            <small>${escapeHtml(metric.detail)}</small>
        </article>
    `).join("");

}

function renderHome(target) {

    const summary = CRM_STATE.data.summary || {};

    target.innerHTML = `
        <div class="module-grid">
            <section class="card">
                <h2>Bonjour ${escapeHtml(summary.patronName || "Patron")}</h2>
                <p class="card-copy">${escapeHtml(summary.dayResume || "Clients et devis a traiter aujourd'hui.")}</p>
                <div class="list" style="margin-top:16px">
                    ${renderRow({
                        title: "Aujourd'hui",
                        text: CRM_STATE.data.today.length + " chantier(s) planifie(s), avec heure de depart et priorite.",
                        status: "ready",
                        label: "pret"
                    })}
                    ${renderRow({
                        title: "Devis",
                        text: CRM_STATE.data.quotes.length + " devis a suivre ou relancer.",
                        status: "info",
                        label: "suivi"
                    })}
                    ${renderRow({
                        title: "Clients",
                        text: CRM_STATE.data.clients.length + " fiches client disponibles.",
                        status: "ready",
                        label: "clients"
                    })}
                </div>
            </section>
            <section class="card">
                <h2>Resume de la journee</h2>
                <div class="list">
                    ${CRM_STATE.data.today.slice(0, 3).map(renderCompactJob).join("")}
                </div>
            </section>
        </div>
    `;

}

function renderToday(target) {

    target.innerHTML = `
        <section class="card">
            <h2>Les chantiers du jour</h2>
            <div class="list">
                ${CRM_STATE.data.today.map(renderTodayJob).join("") || renderEmpty("Aucun chantier du jour charge.")}
            </div>
        </section>
    `;

    bindJobStartButtons(target);

}

function renderJobs(target) {

    target.innerHTML = `
        <section class="card">
            <h2>Liste des chantiers</h2>
            ${renderToolbar("Rechercher un chantier", "Tous les etats")}
            <div class="list">
                ${CRM_STATE.data.jobs.map(renderJobRow).join("") || renderEmpty("Aucun chantier charge.")}
            </div>
        </section>
    `;

}

function renderClients(target) {

    const selectedClient = CRM_STATE.data.clients[0];

    target.innerHTML = `
        <section class="card">
            <h2>Répertoire clients</h2>
            ${renderToolbar("Rechercher un client", "Tous les clients")}
            <div class="list" style="margin-bottom:16px">
                ${CRM_STATE.data.clients.map(renderClientCard).join("") || renderEmpty("Aucun client charge.")}
            </div>
            ${selectedClient ? renderClientProfile(selectedClient) : ""}
        </section>
    `;

}

function renderQuotes(target) {

    const lanes = [
        { key: "pending", title: "En attente" },
        { key: "accepted", title: "Acceptes" },
        { key: "refused", title: "Refuses" }
    ];

    target.innerHTML = `
        <section class="card">
            <div class="toolbar">
                <button class="primary-btn" data-action="open-drawer" data-kind="quote" type="button">Creer un devis</button>
            </div>
            <div class="quote-board">
                ${lanes.map(renderQuoteLane).join("")}
            </div>
        </section>
    `;

    target.querySelector("[data-action='open-drawer']").addEventListener("click", () => openDrawer("quote"));

}

function renderStats(target) {

    const stats = CRM_STATE.data.stats || {};

    target.innerHTML = `
        <section class="card">
            <h2>Statistiques</h2>
            <div class="tri-grid">
                ${renderStatCard("CA du mois", stats.revenue || "0 F", "Objectif commercial mensuel", 72)}
                ${renderStatCard("Devis envoyes", stats.quotesSent || 0, "Volume commercial", 58)}
                ${renderStatCard("Taux d'acceptation", (stats.acceptanceRate || 0) + "%", "Qualite des devis", stats.acceptanceRate || 0)}
                ${renderStatCard("Chantiers termines", stats.jobsDone || 0, "Production finalisee", 66)}
            </div>
        </section>
    `;

}

function renderTodayJob(job) {

    return `
        <article class="job-card">
            <div>
                <h3>${escapeHtml(job.title || "Chantier")}</h3>
                <p class="job-meta">${escapeHtml(job.client || "Client")} - ${escapeHtml(job.address || "Adresse a confirmer")}</p>
                <div class="job-signals">
                    <span class="tag info">Depart ${escapeHtml(job.departure || "--")}</span>
                    <span class="tag ${getPriorityClass(job.priority)}">${escapeHtml(job.priority || "Priorite")}</span>
                    <span class="tag">${escapeHtml(job.estimate || "Temps estime")}</span>
                </div>
            </div>
            <div class="row-actions">
                <button class="primary-btn" type="button" data-job-start="${escapeAttribute(job.id || job.title)}">Commencer</button>
            </div>
        </article>
    `;

}

function bindJobStartButtons(target) {

    target.querySelectorAll("[data-job-start]").forEach((button) => {
        button.addEventListener("click", () => {
            CRM_STATE.draftQueue.unshift({
                type: "job-start",
                name: button.dataset.jobStart,
                createdAt: new Date().toISOString()
            });
            button.textContent = "Lance";
            button.disabled = true;
            renderMetrics();
        });
    });

}

function renderCompactJob(job) {

    return renderRow({
        title: (job.start || "--") + " - " + (job.title || "Chantier"),
        text: (job.client || "Client") + " - depart " + (job.departure || "--") + " - " + (job.estimate || "temps a confirmer"),
        status: job.status || "ready",
        label: job.priority || "priorite"
    });

}

function renderJobRow(job) {

    return `
        <article class="row">
            <div>
                <h3><span class="state-${escapeAttribute(job.status || "ready")}">${escapeHtml(job.state || "Etat")}</span> - ${escapeHtml(job.title || "Chantier")}</h3>
                <p>${escapeHtml(job.client || "Client")} - ${escapeHtml(job.address || "Adresse")}</p>
            </div>
            <div class="row-actions">
                <a class="icon-btn" href="${escapeAttribute(getPhoneUrl(job.phone))}" title="Telephone">Tel</a>
                <a class="icon-btn" href="${escapeAttribute(job.gps || "#")}" target="_blank" rel="noopener" title="GPS">GPS</a>
                <button class="icon-btn" type="button" title="Photos">${escapeHtml(job.photos || 0)} photos</button>
            </div>
        </article>
    `;

}

function renderClientProfile(client) {

    return `
        <div class="client-profile">
            <div class="profile-panel">
                <strong>${escapeHtml(client.name || "Client")}</strong>
                <div class="profile-line"><span>Telephone</span><span>${escapeHtml(client.phone || "-")}</span></div>
                <div class="profile-line"><span>Email</span><span>${escapeHtml(client.email || "-")}</span></div>
                <div class="profile-line"><span>Adresse</span><span>${escapeHtml(client.address || "-")}</span></div>
                <div class="profile-line"><span>Statut</span><span>${escapeHtml(client.status || "-")}</span></div>
            </div>
            <div class="profile-panel">
                <h3>Historique</h3>
                <div class="list" style="margin:12px 0">
                    ${(client.history || []).map((item) => renderRow({ title: item, text: "Evenement client.", status: "info", label: "historique" })).join("")}
                </div>
                <p class="card-copy">${escapeHtml(client.notes || "Aucune note.")}</p>
                <div class="photo-strip">
                    ${(client.photos || []).slice(0, 3).map((photo) => `<div class="photo-tile">${escapeHtml(photo)}</div>`).join("")}
                </div>
                <div class="job-signals">
                    ${(client.quotes || []).map((quote) => `<span class="tag info">${escapeHtml(quote)}</span>`).join("")}
                </div>
            </div>
        </div>
    `;

}

function renderQuoteLane(lane) {

    const quotes = CRM_STATE.data.quotes.filter((quote) => quote.status === lane.key);

    return `
        <div class="lane">
            <h3>${escapeHtml(lane.title)} (${quotes.length})</h3>
            <div class="list">
                ${quotes.map(renderQuoteCard).join("") || renderEmpty("Aucun devis.")}
            </div>
        </div>
    `;

}

function renderInvoices(target) {

    target.innerHTML = `
        <section class="card">
            <div class="toolbar">
                <button class="primary-btn" data-action="open-drawer" data-kind="invoice" type="button">Créer une facture</button>
            </div>
            <div class="list">
                ${CRM_STATE.data.invoices.map(renderQuoteCard).join("") || renderEmpty("Aucune facture.")}
            </div>
        </section>
    `;

    target.querySelector("[data-action='open-drawer']").addEventListener("click", () => openDrawer("invoice"));

}

function renderClientCard(client) {

    return renderRow({
        title: client.name || "Client",
        text: (client.phone || "Téléphone") + " - " + (client.address || "Adresse"),
        status: "ready",
        label: client.status || "client"
    });

}

function renderQuoteCard(quote) {

    return `
        <article class="quote-card">
            <h3>${escapeHtml(quote.number || "DEV")}</h3>
            <p>${escapeHtml(quote.client || "Client")}<br>${escapeHtml(quote.amount || "Montant")} · TVA ${escapeHtml(quote.taxRate || "0%")}</p>
            <span class="tag ${getQuoteClass(quote.status)}">${escapeHtml(quote.label || quote.status || "statut")}</span>
        </article>
    `;

}

function renderTeamMember(member) {

    return `
        <article class="team-card">
            <h3>${escapeHtml(member.name || "Equipe")}</h3>
            <p>${escapeHtml(member.role || "Role")}<br>${escapeHtml(member.status || "Statut")}</p>
            <div class="job-signals">
                <span class="tag ${escapeAttribute(member.state || "ready")}">${escapeHtml(member.status || "statut")}</span>
                <span class="tag info">${escapeHtml(member.hours || "0h00")}</span>
            </div>
        </article>
    `;

}

function renderMessage(message) {

    return `
        <article class="message-card">
            <div class="avatar">${escapeHtml((message.from || "M").charAt(0))}</div>
            <div>
                <h3>${escapeHtml(message.from || "Message")}</h3>
                <p>${escapeHtml(message.text || "")}</p>
            </div>
            <span class="tag ${message.unread ? "warn" : "ready"}">${escapeHtml(message.time || "--")}</span>
        </article>
    `;

}

function renderStatCard(title, value, detail, progress) {

    const width = Math.max(0, Math.min(100, Number(progress) || 0));

    return `
        <article class="stat-card">
            <strong>${escapeHtml(value)}</strong>
            <p>${escapeHtml(title)}<br>${escapeHtml(detail)}</p>
            <div class="progress"><span style="width:${width}%"></span></div>
        </article>
    `;

}

function renderToolbar(placeholder, optionLabel) {

    return `
        <div class="toolbar">
            <input type="search" placeholder="${escapeHtml(placeholder)}">
            <select>
                <option>${escapeHtml(optionLabel)}</option>
            </select>
            <button class="ghost-btn" type="button">Filtrer</button>
        </div>
    `;

}

function renderConnectionSummary() {

    return `
        <div class="list">
            ${renderRow({
                title: "Suivi client",
                text: "Clients, chantiers et devis au meme endroit.",
                status: "ready",
                label: "clair"
            })}
            ${renderRow({
                title: "Priorites",
                text: "Relances, devis et chantiers restent visibles sans messagerie parasite.",
                status: "ready",
                label: "utile"
            })}
            ${renderRow({
                title: "Action",
                text: "Chaque fiche mene vers appel, GPS, devis ou suivi.",
                status: "ready",
                label: "v1"
            })}
        </div>
    `;

}

function renderRow(row) {

    return `
        <article class="row">
            <div>
                <h3>${escapeHtml(row.title)}</h3>
                <p>${escapeHtml(row.text)}</p>
            </div>
            <span class="tag ${escapeAttribute(row.status)}">${escapeHtml(row.label)}</span>
        </article>
    `;

}

function renderEmpty(text) {

    return `<div class="empty">${escapeHtml(text)}</div>`;

}

function openDrawer(kind) {

    const drawer = document.getElementById("crmDrawer");
    const formType = document.getElementById("formType");

    formType.value = kind || "client";
    document.getElementById("drawerTitle").textContent = getDrawerTitle(formType.value);
    document.getElementById("formFeedback").textContent = "Action preparee localement.";

    drawer.classList.add("open");
    drawer.setAttribute("aria-hidden", "false");

}

function closeDrawer() {

    const drawer = document.getElementById("crmDrawer");
    drawer.classList.remove("open");
    drawer.setAttribute("aria-hidden", "true");

}

function saveDraft() {

    const draft = {
        type: document.getElementById("formType").value,
        name: document.getElementById("formName").value.trim(),
        phone: document.getElementById("formPhone").value.trim(),
        address: document.getElementById("formAddress").value.trim(),
        taxRate: document.getElementById("formTaxRate").value + "%",
        notes: document.getElementById("formNotes").value.trim(),
        createdAt: new Date().toISOString()
    };

    CRM_STATE.draftQueue.unshift(draft);
    document.getElementById("crmForm").reset();
    document.getElementById("formFeedback").textContent = "Action ajoutee au suivi du jour.";
    renderCrm();

}

function getDrawerTitle(kind) {

    const titles = {
        client: "Nouveau client",
        quote: "Nouveau devis",
        invoice: "Nouvelle facture"
    };

    return titles[kind] || "Nouvelle action";

}

function getPhoneUrl(phone) {

    return phone ? "tel:" + phone.replace(/\s/g, "") : "#";

}

function getPriorityClass(priority) {

    if (priority === "Haute") {
        return "blocked";
    }

    if (priority === "Moyenne") {
        return "warn";
    }

    return "ready";

}

function getQuoteClass(status) {

    if (status === "accepted") {
        return "ready";
    }

    if (status === "refused") {
        return "blocked";
    }

    return "warn";

}

function updateClock() {

    const now = new Date();
    document.getElementById("crmClock").textContent = now.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "2-digit",
        month: "long"
    }) + " - " + now.toLocaleTimeString("fr-FR", {
        hour: "2-digit",
        minute: "2-digit"
    });

}

function escapeHtml(value) {

    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

}

function escapeAttribute(value) {

    return escapeHtml(value).replace(/`/g, "&#096;");

}

window.KynexCrm = {
    refresh: () => {
        CRM_STATE.data = getInitialData();
        renderCrm();
    },
    getState: () => ({
        view: CRM_STATE.view,
        data: CRM_STATE.data,
        draftQueue: CRM_STATE.draftQueue
    })
};

</script>
<script src="aurel-system.js"></script>

</body>

</html>
