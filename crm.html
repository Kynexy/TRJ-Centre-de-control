<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07182d">
<title>Clients Kynexy</title>
<link rel="stylesheet" href="crm.css">
<link rel="stylesheet" href="aurel-system.css">
</head>

<body>
<main class="client-shell" id="clientApp">
<header class="client-top">
<div>
<span class="eyebrow">Administration</span>
<h1>Clients, devis, factures</h1>
</div>
<button class="primary-btn compact" id="newClient" type="button">Nouveau client</button>
</header>

<section class="quick-section" aria-label="Actions rapides">
<button class="primary-btn big" id="newQuote" type="button">Créer un devis</button>
<button class="secondary-btn big" id="newInvoice" type="button">Créer une facture</button>
</section>

<section class="summary-section" id="summarySection"></section>

<section class="content-section">
<div class="section-head">
<h2>Clients</h2>
<input id="clientSearch" type="search" placeholder="Rechercher">
</div>
<div class="client-list" id="clientList"></div>
</section>

<section class="content-section">
<div class="section-head">
<h2>Documents récents</h2>
<span id="storageStatus">Chargement</span>
</div>
<div class="document-list" id="documentList"></div>
</section>
</main>

<aside class="client-panel" id="clientPanel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
<div class="panel-card" role="document">
<div class="panel-header">
<h2 id="panelTitle">Clients</h2>
<button class="icon-btn" id="closePanel" type="button" aria-label="Fermer">&times;</button>
</div>
<div class="panel-content" id="panelContent"></div>
</div>
</aside>

<script src="client-db.js"></script>
<script src="crm.js"></script>
<script src="aurel-system.js"></script>
</body>

</html>
