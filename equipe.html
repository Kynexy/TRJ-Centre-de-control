<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07182d">

<title>Equipe Kynexy</title>

<link rel="stylesheet" href="equipe.css">
<link rel="stylesheet" href="aurel-system.css">

</head>

<body>

<div class="team-shell">

<header class="topbar">
<div class="title">
<h1>Équipe</h1>
<p>Salariés, heures et paiements</p>
</div>
<div class="status">
<div class="pill" id="teamClock">Initialisation</div>
<div class="pill">Equipe a jour</div>
</div>
</header>

<div class="layout">

<aside class="sidebar">
<nav class="nav" id="teamNav" aria-label="Gestion équipe">
<button class="active" data-view="weekly" type="button">Semaine</button>
<button data-view="payroll" type="button">Salaires</button>
<button data-view="advances" type="button">Acomptes</button>
</nav>
<div class="sidebar-note">
Un module concentré sur les salariés : heures, acomptes et total payé.
</div>
</aside>

<main class="main">

<section class="hero">
<div>
<h2 id="viewTitle">Semaine</h2>
<p id="viewSubtitle">Chaque salarié sur une ligne, avec ses heures, son acompte et le total payé.</p>
</div>
<div class="quick-actions">
<button class="primary-btn" data-shortcut="weekly" type="button">Voir la semaine</button>
<button class="ghost-btn" data-shortcut="payroll" type="button">Salaires</button>
<button class="ghost-btn" data-shortcut="advances" type="button">Acomptes</button>
</div>
</section>

<section class="grid" id="teamMetrics"></section>

<section id="teamView"></section>

</main>

</div>

</div>

<script src="equipe.js"></script>
<script src="aurel-system.js"></script>

</body>

</html>
