<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07182d">

<title>Planning Kynexy</title>

<link rel="stylesheet" href="planning.css">
<link rel="stylesheet" href="aurel-system.css">

</head>

<body>

<main class="calendar-shell" id="planningApp">

<section class="calendar-card" aria-label="Planning Kynexy">
<div class="calendar-toolbar">
<div class="month-picker" aria-label="Navigation du mois">
<button class="nav-pill" id="prevMonth" type="button" aria-label="Mois précédent">&lt;</button>
<div id="monthLabel">Initialisation</div>
<button class="nav-pill" id="nextMonth" type="button" aria-label="Mois suivant">&gt;</button>
</div>
<button class="view-menu" id="viewCycle" type="button" aria-label="Changer de vue">Mois</button>
</div>

<div class="weekday-row" id="weekdayRow">
<span>Lun</span>
<span>Mar</span>
<span>Mer</span>
<span>Jeu</span>
<span>Ven</span>
<span>Sam</span>
<span>Dim</span>
</div>

<div class="month-grid" id="monthGrid" aria-label="Calendrier mensuel"></div>
</section>

</main>

<aside class="appointment-panel" id="appointmentPanel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
<div class="panel-card" role="document">
<div class="panel-header">
<h2 id="panelTitle">Rendez-vous</h2>
<button class="icon-btn" id="closePanel" type="button" aria-label="Fermer">&times;</button>
</div>
<div id="appointmentDetails" class="panel-content"></div>
</div>
</aside>

<script src="planning-db.js"></script>
<script src="planning.js"></script>
<script src="aurel-system.js"></script>

</body>

</html>
