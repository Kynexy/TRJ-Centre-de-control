<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07182d">

<title>Planning - Kynexy TRJ OS</title>

<link rel="stylesheet" href="planning.css">
<link rel="stylesheet" href="aurel-system.css">

</head>

<body>

<main class="calendar-shell">

<header class="topbar">
<div class="title">
<h1>Planning Kynexy</h1>
<p>Calendrier mensuel des rendez-vous TRJ</p>
</div>
<div class="status">
<button class="pill nav-pill" id="prevMonth" type="button">‹</button>
<div class="pill" id="monthLabel">Initialisation</div>
<button class="pill nav-pill" id="nextMonth" type="button">›</button>
</div>
</header>

<section class="hero">
<div>
<h2>Calendrier mensuel</h2>
<p>Une vue claire, lisible et rapide pour organiser les rendez-vous de l'entreprise sans bruit inutile.</p>
</div>
<div class="month-summary" id="monthSummary"></div>
</section>

<section class="calendar-card">
<div class="calendar-toolbar">
<div class="view-switch" id="viewSwitch" aria-label="Vues du calendrier">
<button class="active" data-calendar-view="month" type="button">📅 Mois</button>
<button data-calendar-view="week" type="button">📆 Semaine</button>
<button data-calendar-view="day" type="button">🗓 Jour</button>
<button data-calendar-view="agenda" type="button">📋 Agenda</button>
</div>
<div class="legend" id="categoryLegend"></div>
<button class="ghost-btn" id="todayButton" type="button">Aujourd'hui</button>
</div>

<div class="weekday-row">
<span>Lun</span>
<span>Mar</span>
<span>Mer</span>
<span>Jeu</span>
<span>Ven</span>
<span>Sam</span>
<span>Dim</span>
</div>

<div class="month-grid" id="monthGrid" aria-label="Calendrier mensuel"></div>
</section>

</main>

<aside class="appointment-panel" id="appointmentPanel" aria-hidden="true">
<div class="panel-card">
<div class="panel-header">
<h2>Rendez-vous</h2>
<button class="icon-btn" id="closePanel" type="button" aria-label="Fermer">×</button>
</div>
<div id="appointmentDetails"></div>
</div>
</aside>

<script src="planning.js"></script>
<script src="aurel-system.js"></script>

</body>

</html>
